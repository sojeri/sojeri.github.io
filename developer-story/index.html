        width: 3rem;

    <script type="text/javascript">
      function handleInputChange(wat) {
        // update controls
        const nearby = wat.nextSibling.nextSibling
        const watLabel = wat.getAttribute('aria-label');
        nearby?.setAttribute('aria-label', wat.checked ? `${watLabel} shown` : `${watLabel} hidden`);

        // update timeline events
        const elementsToUpdate = document.getElementsByClassName(wat.value);
        for (let i = 0; i < elementsToUpdate.length; i++) {
          const current = elementsToUpdate[i];
          if (wat.checked) {
            current.classList.remove('nope');
          } else {
            current.classList.add('nope');
          }
        }
      }
      function handleLabelClick(nearby) {
        nearby.previousSibling.previousSibling.click();
      }
      function handleLabelKeydown(nearby, event) {
        if (event.code === 'Enter') handleLabelClick(nearby);
      }
      document.addEventListener('DOMContentLoaded', () => {
        // handling for keyboard navigation
        const elementsToTrack = document.getElementsByClassName('slider');
        for (let i = 0; i < elementsToTrack.length; i++) {
          const current = elementsToTrack[i];
          current.addEventListener('keydown', (e) => {
            handleLabelKeydown(current, e);
          })
        }
        // bonus handling for some browsers which remember checkbox state between page reloads
        ['position', 'project', 'award', 'title-change', 'education'].map(
          s => { return `${s}-control` }
        ).forEach(id => {
          const element = document.getElementById(id);
          if (element) handleInputChange(element);
        })
      })
      const helloWorld = function() {
          const hello = [
            "Hey, you've reached Jeri.",
            "I can't come to the phone right now.",
            "Please leave me a message,",
            "and I'll get back to you shortly.",
            "LinkedIn: https://www.linkedin.com/in/sojeri",
            "Github: https://github.com/sojeri"
          ];

          hello.forEach(function(x) {
              console.error(x);
          });
      }
    </script>
